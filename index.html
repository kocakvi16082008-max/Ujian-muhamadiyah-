<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Kemuhammadiyahan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --gold: #e6a817;
    --gold-light: #f5c842;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --correct: #1a7f37;
    --correct-bg: #0d2d1a;
    --correct-border: #2ea043;
    --wrong: #b62324;
    --wrong-bg: #2d1212;
    --wrong-border: #da3633;
    --neutral: #21262d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 10%, rgba(230,168,23,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(230,168,23,0.04) 0%, transparent 50%);
  }

  .header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
  }

  .header::before {
    content: '☽';
    display: block;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0.8;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.5rem);
    color: var(--gold-light);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .header p {
    color: var(--text-muted);
    margin-top: 8px;
    font-size: 0.95rem;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 15px auto 0;
  }

  /* Progress */
  .progress-bar-wrap {
    max-width: 720px;
    margin: 0 auto 24px;
    padding: 0 10px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Score */
  .score-display {
    max-width: 720px;
    margin: 0 auto 24px;
    display: flex;
    gap: 12px;
    padding: 0 10px;
    flex-wrap: wrap;
  }
  .score-card {
    flex: 1;
    min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
  }
  .score-card .num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
  }
  .score-card .label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .score-card.total .num { color: var(--gold-light); }
  .score-card.correct .num { color: #3fb950; }
  .score-card.wrong .num { color: #f85149; }

  /* Quiz container */
  .quiz-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 10px 40px;
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .question-card.answered::before { opacity: 1; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-num {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 0.97rem;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .option-btn {
    background: var(--neutral);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    transition: all 0.18s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    background: #2d333b;
    border-color: var(--gold);
    transform: translateX(3px);
  }

  .option-btn:disabled { cursor: default; }

  .option-letter {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-muted);
    transition: all 0.18s;
  }

  /* Correct state */
  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    animation: correctPulse 0.4s ease;
  }
  .option-btn.correct .option-letter {
    background: var(--correct-border);
    color: #fff;
  }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.015); }
    100% { transform: scale(1); }
  }

  /* Wrong state */
  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    animation: shake 0.35s ease;
  }
  .option-btn.wrong .option-letter {
    background: var(--wrong-border);
    color: #fff;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    60% { transform: translateX(5px); }
  }

  /* Highlight correct when wrong */
  .option-btn.reveal-correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    opacity: 0.7;
  }
  .option-btn.reveal-correct .option-letter {
    background: var(--correct-border);
    color: #fff;
  }

  /* Feedback */
  .feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 9px;
    font-size: 0.875rem;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: flex; align-items: flex-start; gap: 8px; }
  .feedback.correct-fb {
    background: var(--correct-bg);
    border: 1px solid var(--correct-border);
    color: #56d364;
  }
  .feedback.wrong-fb {
    background: var(--wrong-bg);
    border: 1px solid var(--wrong-border);
    color: #ff7b72;
  }
  .feedback-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

  /* Nav */
  .nav-area {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 10px 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .nav-btn {
    padding: 10px 22px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold-light); }
  .nav-btn.primary {
    background: var(--gold);
    color: #000;
    font-weight: 700;
    border-color: var(--gold);
  }
  .nav-btn.primary:hover { background: var(--gold-light); }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }

  /* Result screen */
  .result-screen {
    display: none;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 10px 60px;
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  .result-screen.show { display: block; }

  .result-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 4px solid var(--gold);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 30px auto 20px;
    background: radial-gradient(ellipse, rgba(230,168,23,0.1), transparent);
  }
  .result-pct {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
  }
  .result-label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.1em; }

  .result-msg {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--text);
    margin-bottom: 8px;
  }
  .result-sub { color: var(--text-muted); font-size: 0.92rem; margin-bottom: 28px; }

  .result-stats {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .r-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 24px;
  }
  .r-stat .n { font-family: 'Playfair Display', serif; font-size: 2rem; }
  .r-stat .t { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .r-stat.ok .n { color: #3fb950; }
  .r-stat.ng .n { color: #f85149; }

  /* Question grid nav */
  .q-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(38px,1fr));
    gap: 6px;
    max-width: 720px;
    margin: 20px auto 0;
    padding: 0 10px;
  }
  .q-dot {
    height: 38px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--neutral);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .q-dot:hover { border-color: var(--gold); color: var(--gold); }
  .q-dot.active { border-color: var(--gold); background: rgba(230,168,23,0.15); color: var(--gold-light); }
  .q-dot.done-ok { background: rgba(46,160,67,0.25); border-color: #2ea043; color: #3fb950; }
  .q-dot.done-ng { background: rgba(218,54,51,0.25); border-color: #da3633; color: #f85149; }

  .view-all-btn {
    max-width: 720px;
    margin: 16px auto 0;
    display: block;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    text-decoration: underline;
    text-align: center;
    width: 100%;
  }
  .view-all-btn:hover { color: var(--gold); }

  .mode-label {
    max-width: 720px;
    margin: 0 auto 10px;
    padding: 0 10px;
    font-size: 0.78rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  @media(max-width:480px){
    .question-card { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Kuis Kemuhammadiyahan</h1>
  <p>ATS Semester 2 — Pilihan Ganda Interaktif</p>
  <div class="divider"></div>
</div>

<div class="score-display">
  <div class="score-card total"><div class="num" id="sc-total">0</div><div class="label">Dijawab</div></div>
  <div class="score-card correct"><div class="num" id="sc-correct">0</div><div class="label">Benar</div></div>
  <div class="score-card wrong"><div class="num" id="sc-wrong">0</div><div class="label">Salah</div></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-info">
    <span id="prog-text">Soal 1 dari 50</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="mode-label" id="mode-label">Mode: Satu per Satu</div>

<div class="q-grid" id="q-grid"></div>
<button class="view-all-btn" id="toggle-view">▼ Tampilkan Semua Sekaligus</button>

<div class="nav-area" id="nav-area">
  <button class="nav-btn" id="btn-prev" onclick="goTo(currentQ-1)">← Sebelumnya</button>
  <button class="nav-btn" id="btn-next" onclick="goTo(currentQ+1)">Selanjutnya →</button>
  <button class="nav-btn primary" id="btn-finish" onclick="showResult()" style="margin-left:auto">Lihat Hasil ✓</button>
</div>

<div class="quiz-container" id="quiz-container"></div>

<div class="result-screen" id="result-screen">
  <div class="result-circle">
    <div class="result-pct" id="res-pct">-</div>
    <div class="result-label">NILAI</div>
  </div>
  <div class="result-msg" id="res-msg">—</div>
  <div class="result-sub" id="res-sub"></div>
  <div class="result-stats">
    <div class="r-stat ok"><div class="n" id="res-ok">0</div><div class="t">Benar</div></div>
    <div class="r-stat ng"><div class="n" id="res-ng">0</div><div class="t">Salah</div></div>
    <div class="r-stat"><div class="n" id="res-skip" style="color:var(--text-muted)">0</div><div class="t">Dilewati</div></div>
  </div>
  <button class="nav-btn primary" onclick="restart()" style="margin:0 auto;display:block;padding:12px 32px">Ulangi Kuis</button>
</div>

<script>
const questions = [
  {
    q: "Muktamar Muhammadiyah ke-37 sangat bersejarah karena terjadi re-tajdid di bidang ideologi. Pembaruan ini kemudian dituangkan dalam...",
    opts: [
      "Anggaran Dasar Muhammadiyah (AD/ART)",
      "Matan Keyakinan dan Cita-Cita Hidup Muhammadiyah (MKCHM)",
      "Kepribadian Muhammadiyah",
      "Muqaddimah Anggaran Dasar Muhammadiyah (MADM)"
    ],
    ans: 1,
    fb: "Muktamar ke-37 di Yogyakarta (1968) menghasilkan MKCHM sebagai rumusan ideologi Muhammadiyah hasil re-tajdid."
  },
  {
    q: "Dalam teologi Al-Ma'un yang diterapkan dalam praktik Muhammadiyah, apa yang menjadi fokus utama dari ajaran Surah Al-Ma'un?",
    opts: [
      "Penekanan ibadah ritual semata",
      "Kepedulian sosial dan perlawanan terhadap kemunafikan",
      "Kewajiban menunaikan zakat mal",
      "Larangan meminta-minta di jalanan"
    ],
    ans: 1,
    fb: "Surah Al-Ma'un mengajarkan kepedulian pada anak yatim dan orang miskin. K.H. Ahmad Dahlan menjadikannya landasan gerakan sosial Muhammadiyah."
  },
  {
    q: "Apa yang menjadi fokus utama dalam ajaran Surah Al-Ashr yang relevan dengan aktivitas sosial Muhammadiyah?",
    opts: [
      "Perintah shalat lima waktu",
      "Kewajiban berpuasa di bulan Ramadhan",
      "Pentingnya waktu, amal saleh, dan kesabaran",
      "Larangan riba dalam muamalah"
    ],
    ans: 2,
    fb: "Surah Al-Ashr menekankan bahwa manusia yang merugi kecuali yang beriman, beramal saleh, saling menasihati dalam kebenaran dan kesabaran—menjadi spirit gerakan sosial Muhammadiyah."
  },
  {
    q: "'Menegakkan dan menjunjung tinggi Agama Islam sehingga terwujud masyarakat Islam yang sebenar-benarnya' (AD/ART Pasal 6). Apa yang ditegakkan dan dijunjung tinggi untuk mewujudkan hal itu?",
    opts: [
      "Nilai-nilai budaya lokal yang Islami",
      "Ajaran Islam dalam seluruh aspek kehidupan (aqidah, ibadah, akhlak, muamalah)",
      "Tradisi salaf yang tidak tertulis",
      "Hukum adat yang berlandaskan syariat"
    ],
    ans: 1,
    fb: "Muhammadiyah menegakkan Islam secara menyeluruh meliputi aqidah, ibadah, akhlak, dan muamalah duniawiyah sesuai Al-Quran dan Sunnah."
  },
  {
    q: "Apa yang membedakan 'khurafat' dari 'tahayul' berdasarkan pernyataan dalam soal?",
    opts: [
      "Khurafat berhubungan dengan kekuatan gaib, tahayul tidak",
      "Khurafat melibatkan ritual-ritual tertentu yang dianggap memengaruhi nasib, sedangkan tahayul lebih pada kepercayaan mistis tanpa dasar agama",
      "Keduanya sama persis dan tidak ada perbedaannya",
      "Tahayul melibatkan ritual, khurafat hanya kepercayaan saja"
    ],
    ans: 1,
    fb: "Khurafat adalah kepercayaan yang diiringi ritual (seperti sesajen, jimat), sedangkan tahayul lebih pada kepercayaan mistis seperti angka sial, hari naas, dll."
  },
  {
    q: "Apa salah satu kontribusi Muhammadiyah yang signifikan dalam masyarakat Indonesia?",
    opts: [
      "Mendirikan partai politik terbesar di Indonesia",
      "Memimpin revolusi fisik melawan penjajah",
      "Mendirikan ribuan lembaga pendidikan, kesehatan, dan sosial di seluruh Indonesia",
      "Menyusun konstitusi Negara Indonesia"
    ],
    ans: 2,
    fb: "Muhammadiyah dikenal sebagai organisasi amal usaha terbesar dengan ribuan sekolah, universitas, rumah sakit, dan panti asuhan di seluruh Indonesia."
  },
  {
    q: "Yang dimaksud dengan qath'i dan sharih dalam penetapan hukum syara' Muhammadiyah adalah...",
    opts: [
      "Dalil yang kuat secara sanad dan matan",
      "Dalil yang pasti (tidak mengandung kemungkinan lain) dan jelas/tegas dalam menunjukkan hukum",
      "Ijma' ulama yang disepakati mayoritas",
      "Pendapat ulama salaf yang mu'tabar"
    ],
    ans: 1,
    fb: "Qath'i artinya dalil yang pasti/tidak mengandung takwil lain; sharih artinya jelas dan tegas menunjuk hukum tertentu tanpa perlu penafsiran lebih lanjut."
  },
  {
    q: "Dalam konteks reformasi sosial, apa contoh kontribusi K.H. Ahmad Dahlan?",
    opts: [
      "Memimpin peperangan melawan Belanda secara fisik",
      "Mendirikan sekolah modern yang memadukan ilmu agama dan umum serta mendirikan klinik kesehatan",
      "Membuat undang-undang perlindungan umat Islam",
      "Menerjemahkan seluruh Al-Quran ke dalam Bahasa Jawa"
    ],
    ans: 1,
    fb: "K.H. Ahmad Dahlan mendirikan sekolah modern dan rumah sakit sebagai bentuk reformasi sosial, mengaplikasikan teologi Al-Ma'un secara nyata."
  },
  {
    q: "Apa yang dimaksud dengan 'sehingga terwujud masyarakat Islam yang sebenar-benarnya' dalam tujuan Muhammadiyah?",
    opts: [
      "Masyarakat yang seluruhnya beragama Islam dan menerapkan syariat formal",
      "Masyarakat yang menegakkan nilai-nilai Islam dalam seluruh aspek kehidupan individu dan sosial berdasarkan Al-Quran dan Sunnah",
      "Masyarakat yang dipimpin oleh ulama dan kiai",
      "Masyarakat yang bebas dari pengaruh budaya Barat"
    ],
    ans: 1,
    fb: "Masyarakat Islam yang sebenar-benarnya adalah masyarakat yang mengamalkan Islam dalam aqidah, ibadah, akhlak, dan muamalah kehidupan sehari-hari."
  },
  {
    q: "Latar belakang berdirinya Muhammadiyah secara INTERNAL ditunjukkan oleh pernyataan nomor? (i) Tokoh pembaharuan Islam dunia; (ii) Sistem pendidikan lemah; (iii) Kesenjangan sosial; (iv) Penjajahan Belanda; (v) Adanya TBC",
    opts: [
      "i, ii, dan iii",
      "ii, iii, dan v",
      "i, iv, dan v",
      "iii, iv, dan v"
    ],
    ans: 1,
    fb: "Faktor internal: sistem pendidikan yang lemah, kesenjangan sosial, dan adanya TBC (Tahayul, Bid'ah, Khurafat) dalam praktik keagamaan umat Islam Indonesia."
  },
  {
    q: "Latar belakang berdirinya Muhammadiyah secara EKSTERNAL ditunjukkan oleh pernyataan nomor? (i) Tokoh pembaharuan Islam dunia; (ii) Sistem pendidikan lemah; (iii) Kesenjangan sosial; (iv) Penjajahan Belanda; (v) Adanya TBC",
    opts: [
      "i dan iv",
      "ii dan iii",
      "iii dan v",
      "iv dan v"
    ],
    ans: 0,
    fb: "Faktor eksternal: hadirnya tokoh pembaharuan Islam dunia (seperti Jamaluddin Al-Afghani, Muhammad Abduh) dan penjajahan kolonial Belanda yang membawa misi kristenisasi."
  },
  {
    q: "Perhatikan pernyataan: (1) membaca Al-Quran di Surau; (2) mempercayai Trinitas; (3) puasa 10 Muharram; (4) mengeramatkan kuburan wali; (5) memakai kalung penangkal bala. Bentuk-bentuk perbuatan syirik terdapat pada nomor...",
    opts: [
      "1, 2, dan 3",
      "2, 4, dan 5",
      "1, 3, dan 4",
      "3, 4, dan 5"
    ],
    ans: 1,
    fb: "Mempercayai Trinitas (syirik aqidah), mengeramatkan kuburan wali (syirik dalam ibadah/tawassul), dan memakai kalung penangkal bala (syirik dalam keyakinan) adalah bentuk syirik."
  },
  {
    q: "Di Indonesia banyak kepercayaan terhadap barang yang didasarkan pada kecerdikan akal bukan sumber Islam, termasuk pemujaan alam agar tidak mengamuk. Perbuatan ini merupakan contoh perbuatan...",
    opts: [
      "Bid'ah hasanah",
      "Khurafat",
      "Mubah",
      "Makruh"

      "Lembaga fatwa keagamaan"
    ],
    ans: 1,
    fb: "Fungsi Muhammadiyah sebagai gerakan dakwah Islam—alat perjuangan untuk menegakkan amar ma'ruf nahi munkar dan menyebarkan Islam rahmatan lil alamin."
  },
  {
    q: "Sikap yang paling tepat mencerminkan nilai Amal Usaha Muhammadiyah dalam keseharian pelajar adalah...",
    opts: [
      "Hanya berfokus pada prestasi akademik pribadi",
      "Aktif berkontribusi dalam kegiatan sosial sekolah, membantu teman yang kesulitan, dan terlibat dalam kegiatan dakwah dengan ikhlas",
      "Menunggu perintah dari pimpinan organisasi sebelum bertindak",
      "Membatasi diri pada kegiatan ibadah ritual saja"
    ],
    ans: 1,
    fb: "Nilai Amal Usaha Muhammadiyah tercermin dalam kerja keras, pengabdian, dan kontribusi nyata: aktif dalam kegiatan sosial, membantu sesama, dan berdakwah dengan tulus ikhlas."
  }
];

let currentQ = 0;
let answers = new Array(questions.length).fill(null);
let viewAll = false;

function init() {
  buildGrid();
  renderSingle(0);
  updateScore();
}

function buildGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'q-dot' + (i === currentQ ? ' active' : '');
    d.id = 'dot-' + i;
    d.textContent = i + 1;
    d.onclick = () => goTo(i);
    grid.appendChild(d);
  });
}

function updateDot(i) {
  const d = document.getElementById('dot-' + i);
  if (!d) return;
  d.className = 'q-dot';
  if (answers[i] !== null) {
    d.classList.add(answers[i] ? 'done-ok' : 'done-ng');
  }
  if (!viewAll && i === currentQ) d.classList.add('active');
}

function updateAllDots() {
  questions.forEach((_, i) => updateDot(i));
}

function renderSingle(idx) {
  const c = document.getElementById('quiz-container');
  c.innerHTML = '';
  const card = makeCard(idx);
  c.appendChild(card);

  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === questions.length - 1;
  document.getElementById('prog-text').textContent = `Soal ${idx + 1} dari ${questions.length}`;
  const done = answers.filter(a => a !== null).length;
  const pct = Math.round(done / questions.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  updateAllDots();
}

function renderAll() {
  const c = document.getElementById('quiz-container');
  c.innerHTML = '';
  questions.forEach((_, i) => {
    c.appendChild(makeCard(i));
  });
  document.getElementById('nav-area').style.display = 'none';
  const done = answers.filter(a => a !== null).length;
  const pct = Math.round(done / questions.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-text').textContent = `${done} dari ${questions.length} dijawab`;
  updateAllDots();
}

function makeCard(idx) {
  const q = questions[idx];
  const answered = answers[idx] !== null;

  const card = document.createElement('div');
  card.className = 'question-card' + (answered ? ' answered' : '');
  card.id = 'card-' + idx;

  const letters = ['A','B','C','D'];

  card.innerHTML = `
    <div class="q-num">Soal ${idx + 1}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts-${idx}">
      ${q.opts.map((opt, oi) => `
        <button class="option-btn" id="opt-${idx}-${oi}" onclick="answer(${idx},${oi})" ${answered ? 'disabled' : ''}>
          <span class="option-letter">${letters[oi]}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="feedback" id="fb-${idx}">
      <span class="feedback-icon"></span>
      <span id="fb-text-${idx}"></span>
    </div>
  `;

  // If already answered, restore state
  if (answered) {
    restoreAnswerState(idx, q);
  }

  return card;
}

function restoreAnswerState(idx, q) {
  // We store the chosen option index in answers (but null means unanswered)
  // We need to store which option was chosen
  if (answers[idx] === null) return;
  const chosen = answerChosen[idx];
  applyVisual(idx, chosen, q.ans);
}

// Store chosen option for each question
let answerChosen = new Array(questions.length).fill(null);

function answer(idx, chosen) {
  if (answers[idx] !== null) return;
  const q = questions[idx];
  const isCorrect = chosen === q.ans;
  answers[idx] = isCorrect;
  answerChosen[idx] = chosen;

  applyVisual(idx, chosen, q.ans);
  updateScore();
  updateDot(idx);

  document.getElementById('card-' + idx).classList.add('answered');

  // Auto advance in single mode after delay
  if (!viewAll) {
    if (idx < questions.length - 1) {
      setTimeout(() => goTo(idx + 1), 900);
    }
    const done = answers.filter(a => a !== null).length;
    const pct = Math.round(done / questions.length * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-text').textContent = `Soal ${currentQ + 1} dari ${questions.length}`;
  } else {
    const done = answers.filter(a => a !== null).length;
    const pct = Math.round(done / questions.length * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-text').textContent = `${done} dari ${questions.length} dijawab`;
  }
}

function applyVisual(idx, chosen, correct) {
  const btns = document.querySelectorAll(`#opts-${idx} .option-btn`);
  btns.forEach(b => b.disabled = true);

  const chosenBtn = document.getElementById(`opt-${idx}-${chosen}`);
  const correctBtn = document.getElementById(`opt-${idx}-${correct}`);

  if (chosen === correct) {
    chosenBtn.classList.add('correct');
  } else {
    chosenBtn.classList.add('wrong');
    correctBtn.classList.add('reveal-correct');
  }

  const fb = document.getElementById(`fb-${idx}`);
  const fbText = document.getElementById(`fb-text-${idx}`);
  const fbIcon = fb.querySelector('.feedback-icon');
  fb.classList.add('show');
  if (chosen === correct) {
    fb.classList.add('correct-fb');
    fbIcon.textContent = '✓';
    fbText.textContent = `Benar! ${questions[idx].fb}`;
  } else {
    fb.classList.add('wrong-fb');
    fbIcon.textContent = '✗';
    fbText.textContent = `Salah. ${questions[idx].fb}`;
  }
}

function updateScore() {
  const done = answers.filter(a => a !== null).length;
  const correct = answers.filter(a => a === true).length;
  const wrong = answers.filter(a => a === false).length;
  document.getElementById('sc-total').textContent = done;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
}

function goTo(idx) {
  if (idx < 0 || idx >= questions.length || viewAll) return;
  currentQ = idx;
  renderSingle(idx);
}

let toggleState = false;
document.getElementById('toggle-view').onclick = function() {
  viewAll = !viewAll;
  toggleState = viewAll;
  if (viewAll) {
    document.getElementById('nav-area').style.display = 'none';
    document.getElementById('mode-label').textContent = 'Mode: Semua Sekaligus';
    this.textContent = '▲ Kembali ke Mode Satu per Satu';
    renderAll();
  } else {
    document.getElementById('nav-area').style.display = 'flex';
    document.getElementById('mode-label').textContent = 'Mode: Satu per Satu';
    this.textContent = '▼ Tampilkan Semua Sekaligus';
    renderSingle(currentQ);
  }
  updateAllDots();
};

function showResult() {
  const done = answers.filter(a => a !== null).length;
  const correct = answers.filter(a => a === true).length;
  const wrong = answers.filter(a => a === false).length;
  const skip = questions.length - done;
  const pct = Math.round(correct / questions.length * 100);

  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('nav-area').style.display = 'none';
  document.getElementById('toggle-view').style.display = 'none';
  document.getElementById('q-grid').style.display = 'none';
  document.getElementById('mode-label').style.display = 'none';

  document.getElementById('res-pct').textContent = pct + '%';
  document.getElementById('res-ok').textContent = correct;
  document.getElementById('res-ng').textContent = wrong;
  document.getElementById('res-skip').textContent = skip;

  let msg, sub;
  if (pct >= 90) { msg = 'Luar Biasa! 🏆'; sub = 'Penguasaan materi sangat baik. Teruskan!'; }
  else if (pct >= 75) { msg = 'Bagus! 👏'; sub = 'Hasil yang baik. Masih ada ruang untuk berkembang.'; }
  else if (pct >= 60) { msg = 'Cukup Baik 📚'; sub = 'Pertahankan dan pelajari lagi bagian yang salah.'; }
  else { msg = 'Perlu Belajar Lagi 💪'; sub = 'Ulangi materi dan coba kuis ini kembali.'; }

  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-sub').textContent = sub;
  document.getElementById('result-screen').classList.add('show');
}

function restart() {
  answers = new Array(questions.length).fill(null);
  answerChosen = new Array(questions.length).fill(null);
  currentQ = 0;
  viewAll = false;

  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('quiz-container').style.display = '';
  document.getElementById('nav-area').style.display = 'flex';
  document.getElementById('toggle-view').style.display = '';
  document.getElementById('q-grid').style.display = 'grid';
  document.getElementById('mode-label').style.display = '';
  document.getElementById('toggle-view').textContent = '▼ Tampilkan Semua Sekaligus';
  document.getElementById('mode-label').textContent = 'Mode: Satu per Satu';

  updateScore();
  buildGrid();
  renderSingle(0);
}

init();
</script>
</body>
</html>
